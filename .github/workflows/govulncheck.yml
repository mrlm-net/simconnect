name: Security Vulnerability Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Scan main module
        run: govulncheck ./...

      - name: Scan simvar-cli module
        run: govulncheck .
        working-directory: cmd/simvar-cli
